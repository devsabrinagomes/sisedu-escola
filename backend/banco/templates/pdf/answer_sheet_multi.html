{% load static %}
<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Cartão Resposta</title>

  <style>
    @page { size: A4; margin: 5mm; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, Helvetica, sans-serif; color:#111; font-size: 8.6pt; background:#fff; }

    :root{
      --ink:#0f172a;
      --dark-green:#1f5f3a;
    }

    .sheet{
      display:grid;
      min-height: 287mm;
      margin: 0 auto;
      place-items: center;
    }

    .card{
      width: 100mm;
      height: 140mm;
      border: 1.4px solid #111;
      border-radius: 2.5mm;
      padding: 4mm;
      page-break-inside: avoid;
      overflow: visible;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 0;
      gap: 1.8mm;
    }

    .card{ font-size: 8.6pt; }

    .card-top{
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      flex-shrink: 0;
    }

    .card-header{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 4mm;
      padding-bottom: 2.2mm;
      border-bottom: 2px solid var(--dark-green);
      margin-bottom: 1.4mm;
    }

    .brand-left{ display:flex; flex-direction:column; gap: 0.8mm; min-width:0; margin-left: -1mm; }
    .brand-left img{ height: 14mm; width:auto; object-fit:contain; display:block; }
    .brand-sub{ margin:0; font-weight:800; color: var(--ink); }

    .brand-right img{ height: 10mm; width:auto; object-fit:contain; display:block; }

    .title{
      font-weight: 900;
      text-transform: uppercase;
      margin: 2mm 0 1.2mm 0;
      color: var(--ink);
      letter-spacing: .2px;
      text-align:center;
    }

    .row-fields{ display:flex; gap: 4mm; margin-bottom: 1.2mm; }
    .name-line{ margin-bottom: 1.2mm; }
    .line-field{ flex:1; display:flex; align-items:center; gap: 2mm; }
    .line-field span{ font-weight:800; white-space:nowrap; color:var(--ink); }
    .line{ flex:1; border-bottom: 1.4px solid #111; height:0; transform: translateY(1mm); }

    .booklet-bar{
      border: 1.4px solid var(--dark-green);
      border-radius: 2mm;
      padding: 1.4mm 3mm;
      background: #fff;
      text-align:center;
      font-weight: 900;
      margin: 1.4mm 0 1.8mm 0;
      color: var(--ink);
      line-height: 1.15;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .card-bottom{
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .grid-wrap{
      border: 0;
      border-radius: 0;
      padding: 0.6mm 0 0 0;
      background:#fff;
      margin-top: 0;
      flex: 1 1 auto;
      min-height: 0;
    }

    .grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 4mm; height: 100%; }
    .col{
      border: 1.4px solid #111;
      border-radius: 2mm;
      padding: 1.6mm 1.2mm;
      page-break-inside: avoid;
      overflow: hidden;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1.6mm;
      justify-content: space-evenly;
    }

    .row{
      display:flex;
      align-items:center;
      gap: 2.2mm;
      margin: 0;
      min-height: 6.6mm;
      line-height: 1;
      page-break-inside: avoid;
      min-width: 0;
    }

    .qnum{
      width: 8.4mm;
      font-weight: 900;
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-size: 7.6pt;
      color: var(--ink);
    }

    .bubbles{
      display:grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      column-gap: 1.1mm;
      width: 100%;
      min-width: 0;
    }

    .bubble{
      width: 5.2mm;
      height: 5.2mm;
      border: 1.2px solid #111;
      border-radius: 50%;
      justify-self: center;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight: 900;
      font-size: 6.5pt;
      line-height: 1;
      background:#fff;
      color:#111;
      flex: 0 0 auto;
    }

  </style>
</head>

<body>
  <div class="sheet">
      <div class="card">
        <div class="card-top">
          <div class="card-header">
            <div class="brand-left">
              <img src="{% static 'assets/images/logo/logo.png' %}" alt="Sisedu Escola">
            </div>
            <div class="brand-right">
              <img src="{% static 'assets/images/logo/ceara.png' %}" alt="Ceará Governo do Estado">
            </div>
          </div>

          <div class="title">Cartão Resposta</div>

          <div class="line-field name-line"><span>Nome:</span><div class="line"></div></div>

          <div class="row-fields">
            <div class="line-field"><span>Série:</span><div class="line"></div></div>
            <div class="line-field"><span>Turma:</span><div class="line"></div></div>
          </div>

          <div class="booklet-bar">Caderno: {{ booklet_name }}</div>
        </div>

        <div class="card-bottom">
          <div class="grid-wrap">
            <div class="grid">
              <div class="col">
                {% for n in left_nums %}
                <div class="row">
                  <div class="qnum">{{ n|stringformat:"02d" }}</div>
                  <div class="bubbles">
                    <div class="bubble">A</div><div class="bubble">B</div><div class="bubble">C</div><div class="bubble">D</div><div class="bubble">E</div>
                  </div>
                </div>
                {% endfor %}
              </div>

              <div class="col">
                {% for n in right_nums %}
                <div class="row">
                  <div class="qnum">{{ n|stringformat:"02d" }}</div>
                  <div class="bubbles">
                    <div class="bubble">A</div><div class="bubble">B</div><div class="bubble">C</div><div class="bubble">D</div><div class="bubble">E</div>
                  </div>
                </div>
                {% endfor %}
              </div>
            </div>
          </div>
        </div>
      </div>
  </div>
</body>
</html>
